<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VeriShare</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Syne:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <script type="module" src="main.js" defer></script>
</head>

<body>

  <div id="login-screen">
    <div class="login-card">
      <img src="verishare.svg" class="login-logo" alt="VeriShare" draggable="false" />
      <div class="login-sub">Kurumsal Ağ Transfer Platformu</div>
      <label class="login-label">Kullanıcı Adı</label>
      <input class="login-input" id="name-input" type="text" placeholder="Adınızı giriniz" maxlength="24" autofocus>
      <button class="login-btn" id="join-btn">Oturum Aç</button>
      <div class="login-version">v5.0.0</div>
    </div>
  </div>

  <div id="app">
    <header class="header">
      <img src="verishare.svg" class="header-logo" alt="VeriShare" data-tauri-drag-region draggable="false" />
      <div class="header-meta">
        <div class="status-dot">
          <div class="dot"></div>
          <span id="wifi-name">YEREL AĞ BAĞLI</span>
        </div>
        <div class="my-name" id="header-name"></div>
        <div class="app-version-badge">v5.0.0</div>
      </div>
    </header>

    <div class="main">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span>Ağdaki Kullanıcılar</span>
          <div class="sidebar-actions">
            <button class="refresh-btn" id="refresh-btn" title="Ağı Tara">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
              </svg>
            </button>
            <span class="online-count" id="online-count">0</span>
          </div>
        </div>
        <div class="sidebar-search">
          <input type="text" id="user-search" placeholder="İsim ara..." autocomplete="off">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
          </svg>
        </div>
        <div class="user-list" id="user-list"></div>
      </aside>

      <div class="content">
        <div class="drop-area" id="drop-area">
          <div id="no-target" class="no-target-msg">
            <div class="no-target-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.35">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
            </div>
            <p class="no-target-title">Hedef Cihaz Seçiniz</p>
            <span class="sub-text">Aktarım yapmak için sol menüden bir bağlantı noktası belirleyin.</span>
          </div>

          <div id="drop-target-ui" style="display:none; flex-direction:column; align-items:center; width:100%;">
            <div class="drop-frame" id="drop-frame">
              <div class="drop-icon-container">
                <svg class="drop-svg-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                  <polyline points="17 8 12 3 7 8"/>
                  <line x1="12" y1="3" x2="12" y2="15"/>
                </svg>
              </div>
              <div class="drop-target-name" id="drop-target-name"></div>
              <div class="drop-hint">Dosya veya klasörleri bu alana sürükleyin</div>
              <div class="drop-divider">
                <span>veya</span>
              </div>
              <button class="browse-btn" id="browse-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                </svg>
                Dosya Seç
              </button>
            </div>
          </div>
        </div>

        <div class="transfer-log">
          <div class="log-header">
            <div class="log-header-left">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
              <span>İşlem Geçmişi</span>
              <button class="log-clear-btn" id="log-clear-btn" title="Tamamlananları Temizle">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
              </button>
            </div>
            <span class="log-count" id="log-count">0</span>
          </div>
          <div id="log-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Gelen Dosya Modal -->
  <div class="modal-overlay" id="incoming-modal">
    <div class="modal">
      <div class="modal-title">📥 Gelen İstek</div>
      <div class="modal-file" id="modal-file-name"></div>
      <div class="modal-size" id="modal-file-meta"></div>
      <div class="modal-actions">
        <button class="modal-btn accept" id="accept-btn">Kabul Et</button>
        <button class="modal-btn decline" id="decline-btn">Reddet</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

</body>

</html>
