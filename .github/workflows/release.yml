name: VeriShare Multi-Platform Release

on:
  push:
    tags:
      - 'v*' # Sadece v ile başlayan tagler atıldığında çalışır (v1.0.0 vb.)
  workflow_dispatch: # Manuel olarak GitHub sitesinden başlatabilmek için

# Bu kısım uygulamanızın release (sürüm) oluşturabilmesi için GitHub'a 'Yazma/Değiştirme' izni verir.
permissions:
  contents: write

jobs:
  release:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    strategy:
      fail-fast: false
      matrix:
        # Hem Mac hem Windows sunucularını aynı anda ayağa kaldırıyoruz
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Kurulum - Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Kurulum - Bagimliliklar (NPM)
        run: npm install

      - name: Kurulum - Rust Araclari
        uses: dtolnay/rust-toolchain@stable

      - name: Yayinla - Tauri App (.exe ve .dmg olusturucu)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: 'v__VERSION__'
          releaseName: 'VeriShare v__VERSION__'
          releaseBody: 'Yeni sürüm yayınlandı! Mevcut uygulamanız otomatik güncellenecektir.'
          releaseDraft: false
          prerelease: false
